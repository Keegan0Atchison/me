	<script>
		(() => {
			const params = new URLSearchParams(window.location.search);
			const theme = params.get('theme') || localStorage.getItem('theme') || 'dark';
			const root = document.documentElement;

			if (theme === 'dark') {
				root.style.setProperty('--bg-white', '#1a1a1a');
				root.style.setProperty('--text-grey', '#cccccc');
				root.style.backgroundColor = '#1a1a1a';
				root.classList.add('dark-mode');
			} else {
				root.style.setProperty('--bg-white', '#ffffff');
				root.style.setProperty('--text-grey', '#555555');
				root.style.backgroundColor = '#ffffff';
				root.classList.remove('dark-mode');
			}
		})();
	</script>

	<script>
		(() => {
			const root = document.documentElement;
			const params = new URLSearchParams(window.location.search);
			const theme = params.get('theme') || localStorage.getItem('theme') || 'dark';

			function applyTheme(selectedTheme) {
				if (selectedTheme === 'dark') {
					root.style.setProperty('--bg-white', '#1a1a1a');
					root.style.setProperty('--text-grey', '#cccccc');
					document.body.classList.add('dark-mode');
					document.body.style.backgroundColor = '#1a1a1a';
				} else {
					root.style.setProperty('--bg-white', '#ffffff');
					root.style.setProperty('--text-grey', '#555555');
					document.body.classList.remove('dark-mode');
					document.body.style.backgroundColor = '#ffffff';
				}

				localStorage.setItem('theme', selectedTheme);

				document.querySelectorAll('nav a').forEach(link => {
					const href = link.getAttribute('href');
					if (!href) {
						return;
					}

					const url = new URL(href, window.location.href);
					url.searchParams.set('theme', selectedTheme);
					link.setAttribute('href', `${url.pathname}${url.search}${url.hash}`);
				});
			}

			applyTheme(theme);
		})();
	</script>
